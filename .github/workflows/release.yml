name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/runestone release/
          cp -r .claude/skills/rune release/skill-rune
          cp install-claude-code.sh release/
          cp README.md release/
          tar czf runestone-$(git describe --tags).tar.gz -C release .
          echo "ARTIFACT=runestone-$(git describe --tags).tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
